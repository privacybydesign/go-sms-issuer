# Workflow to check whether changes to master fulfill all requirements.
name: Status checks

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    # Run every monday on 9:00 in the morning (UTC).
    - cron: "0 9 * * 1"
  # Make it possible to trigger the checks manually.
  workflow_dispatch:

jobs:
    build-frontend:
      strategy:
        matrix:
          lang: [ en, nl ]
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v6

        - uses: actions/setup-node@v6
          with:
            node-version: '24'
            cache: npm
            cache-dependency-path: frontend/package-lock.json

        - name: Install dependencies
          working-directory: frontend
          run: npm ci

        - name: Build
          working-directory: frontend
          run: npm run build

    analyze-go:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v6
        - uses: actions/setup-go@v6
          with:
            go-version-file: backend/go.mod
        - name: Check fmt
          working-directory: backend
          run:  test -z $(gofmt -l .)

        - name: Run linter
          uses: golangci/golangci-lint-action@v9.2.1
          with:
            version: v2.12.2
            working-directory: backend
            args: --timeout 5m

    test-go:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v6

        - name: Docker meta
          id: meta
          uses: docker/metadata-action@v6
          with:
            images: ghcr.io/${{ github.repository }}
            tags: |
              type=semver,pattern={{major}}.{{minor}}.{{patch}}
              type=raw,value=edge

        - name: Login to GitHub Container Registry
          uses: docker/login-action@v4
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Build Docker image for testing
          run: docker build -t sms-issuer-tests --file Dockerfile.test .

        - name: Create coverage directory
          run: mkdir -p coverage

        - name: Run tests (emit coverage.out)
          # Mount ./coverage from the runner into /coverage in the container
          run: |
            docker run --rm \
              -v "${{ github.workspace }}/coverage:/coverage" \
              sms-issuer-tests

        - name: Upload coverage to Codecov
          uses: codecov/codecov-action@v6
          with:
            files: coverage/coverage.out
            flags: backend
            fail_ci_if_error: true
          env:
            # Required for private repos. Not needed if your repo is public and tokenless upload is enabled.
            CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
       

    build-docker-image:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v6

        - name: Docker meta
          id: meta
          uses: docker/metadata-action@v6
          with:
            images: ghcr.io/${{ github.repository }}
            tags: |
              type=semver,pattern={{major}}.{{minor}}.{{patch}}
              type=raw,value=edge

        - name: Login to GitHub Container Registry
          uses: docker/login-action@v4
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Build container
          uses: docker/build-push-action@v7
          with:
            context: .
            push: false
            tags: ${{ steps.meta.outputs.tags }}
            labels: ${{ steps.meta.outputs.labels }}
